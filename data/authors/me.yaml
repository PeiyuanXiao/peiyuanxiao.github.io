bio: |
  Welcome to my website!

  I am a PhD student in archaeology at the Institute of Tibetan Plateau Research,
  Chinese Academy of Sciences. I am currently a visiting student in the Department
  of Anthropology at the University of Washington. My supervisors are
  [Professor Hao Li](https://itpcas.cas.cn/sourcedb_itpcas_cas/cn/expert/202412/t20241202_7449229.html)
  and [Professor Ben Marwick](https://faculty.washington.edu/bmarwick/).

  My research focuses on Middle Paleolithic technological behavior and human
  adaptation in East Asia. During my master's studies, I investigated Quina
  retouch in Southwest China. In my doctoral research, I am examining core
  reduction technology across a broader region of China.

  Methodologically, I am particularly interested in quantitative approaches. My
  current work mainly combines 3D geometric morphometric analysis with data
  analysis in R and Python. I believe that quantitative methods represent an
  important direction for the future development of Paleolithic archaeology, as
  they allow us to better understand past human technological behavior and
  cognitive decision-making from a more objective perspective.

  I am also strongly committed to [Open Science](https://en.wikipedia.org/wiki/Open_science).
  By making data and code openly available, I hope to contribute to making lithic
  study more reproducible and, in the long term, to supporting the development of
  truly large-scale data-driven research in Paleolithic archaeology.

