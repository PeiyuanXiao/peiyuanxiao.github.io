bio: |
  I am a Ph.D. student specializing in Paleolithic archaeology. My research
  focuses on lithic technology analysis, with an emphasis on the technological
  behaviors of humans during the Middle Paleolithic. My goal is to reconstruct
  the technological strategies of hominins through quantitative data analysis.

