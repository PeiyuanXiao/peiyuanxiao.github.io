{{/* Project custom style overrides (injected at end of <head>) */}}
<style>
  /* Hide the "Professional Summary" heading row above the bio
     (resume-biography-3 block). Anchored on the unique .bio-text class. */
  .mb-12:has(.bio-text) > div:first-child { display: none; }

  /* Education timeline layout in the homepage biography block. */
  .mb-16:has(> .flex h3) > .grid.grid-cols-1.md\:grid-cols-2.xl\:grid-cols-3 {
    display: block;
    max-width: 820px;
    margin: 0 auto;
    padding-left: 1.5rem;
    border-left: 2px solid rgb(var(--hb-primary-500-rgb) / 0.28);
  }

  .mb-16:has(> .flex h3) > .grid.grid-cols-1.md\:grid-cols-2.xl\:grid-cols-3 > .group {
    position: relative;
    margin-bottom: 1rem;
    background: transparent;
    border: 1px solid rgb(229 231 235 / 0.85);
    box-shadow: none;
  }

  .mb-16:has(> .flex h3) > .grid.grid-cols-1.md\:grid-cols-2.xl\:grid-cols-3 > .group:hover {
    box-shadow: none;
  }

  .mb-16:has(> .flex h3) > .grid.grid-cols-1.md\:grid-cols-2.xl\:grid-cols-3 > .group::before {
    content: "";
    position: absolute;
    left: -1.9rem;
    top: 1.55rem;
    width: 0.8rem;
    height: 0.8rem;
    border-radius: 999px;
    background: rgb(var(--hb-primary-500-rgb));
    box-shadow: 0 0 0 4px rgb(var(--hb-primary-500-rgb) / 0.14);
  }

  @media (max-width: 640px) {
    .mb-16:has(> .flex h3) > .grid.grid-cols-1.md\:grid-cols-2.xl\:grid-cols-3 {
      margin-left: 0.4rem;
      padding-left: 1.25rem;
    }

    .mb-16:has(> .flex h3) > .grid.grid-cols-1.md\:grid-cols-2.xl\:grid-cols-3 > .group {
      padding: 1.25rem;
    }
  }
</style>
