{{/* Project custom style overrides (injected at end of <head>) */}}
<style>
  /* Hide the "Professional Summary" heading row above the bio
     (resume-biography-3 block). Anchored on the unique .bio-text class. */
  .mb-12:has(.bio-text) > div:first-child { display: none; }

  /* Place Education and Interests side by side below the bio. */
  .resume-biography .md\:col-span-8:has(.bio-text) {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 2rem 3rem;
    align-items: start;
  }

  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-12 {
    grid-column: 1 / -1;
    margin-bottom: 0;
  }

  .resume-biography .bio-text {
    font-size: 1.08rem;
    font-weight: 500;
    line-height: 1.8;
  }

  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) {
    grid-column: 1;
    margin-bottom: 0;
  }

  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) + div {
    grid-column: 2;
  }

  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) > .flex,
  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) + div > .flex {
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) > .flex > div:first-child,
  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) + div > .flex > div:first-child {
    width: 2rem;
    height: 2rem;
  }

  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) h3,
  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) + div h3 {
    font-size: 1.25rem;
  }

  /* Education: simple compact list instead of cards. */
  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) > .grid.grid-cols-1.md\:grid-cols-2.xl\:grid-cols-3 {
    display: block;
  }

  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) > .grid > .group {
    background: transparent;
    border: 0;
    border-radius: 0;
    box-shadow: none;
    margin-bottom: 1rem;
    padding: 0 0 1rem;
    border-bottom: 1px solid rgb(229 231 235 / 0.85);
    backdrop-filter: none;
  }

  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) > .grid > .group:hover {
    box-shadow: none;
    border-color: rgb(229 231 235 / 0.85);
  }

  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) > .grid > .group > .flex {
    gap: 0;
  }

  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) > .grid > .group > .flex > div:first-child {
    display: none;
  }

  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) > .grid > .group p:first-child {
    font-size: 1.08rem;
    line-height: 1.45;
  }

  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) > .grid > .group p {
    margin-top: 0.25rem;
  }

  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) > .grid > .group p:nth-child(2),
  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) > .grid > .group p:nth-child(3) {
    font-size: 1rem;
    line-height: 1.5;
  }

  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) > .grid > .group p:last-child {
    font-weight: 600;
  }

  /* Interests: plain one-column list to match Education. */
  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) + div > .flex.flex-wrap {
    display: block;
  }

  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) + div > .flex.flex-wrap > span {
    display: block;
    width: 100%;
    background: transparent;
    border: 0;
    border-radius: 0;
    color: inherit;
    font-size: 1.08rem;
    font-weight: 500;
    line-height: 1.45;
    margin: 0 0 0.75rem;
    padding: 0 0 0.75rem;
    border-bottom: 1px solid rgb(229 231 235 / 0.85);
  }

  .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) + div > .flex.flex-wrap > span:hover {
    background: transparent;
    color: inherit;
    border-bottom-color: rgb(229 231 235 / 0.85);
  }

  /* Featured Publications and Talks: card grids. */
  #featured-publications .container.grid,
  #talks .container.grid {
    max-width: 72rem;
  }

  @media (min-width: 1024px) {
    #featured-publications .container.grid,
    #talks .container.grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
  }

  /* Publications: compact list with a right-side thumbnail. */
  .publication-compact-item {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 9.5rem;
    gap: 1.25rem;
    align-items: center;
    padding: 1.1rem 0;
    border-bottom: 1px solid rgb(229 231 235 / 0.9);
  }

  .publication-compact-title {
    margin: 0;
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.35;
    color: rgb(17 24 39);
  }

  .dark .publication-compact-title {
    color: rgb(244 244 245);
  }

  .publication-compact-title a:hover {
    color: rgb(var(--hb-primary-500-rgb));
    text-decoration: underline;
  }

  .publication-compact-authors {
    margin-top: 0.35rem;
    font-size: 0.92rem;
    line-height: 1.45;
    color: rgb(82 82 91);
  }

  .dark .publication-compact-authors {
    color: rgb(161 161 170);
  }

  .publication-compact-authors strong {
    font-weight: 700;
    color: rgb(17 24 39);
  }

  .dark .publication-compact-authors strong {
    color: rgb(244 244 245);
  }

  .publication-compact-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem 0.75rem;
    margin-top: 0.45rem;
    font-size: 0.9rem;
    line-height: 1.45;
    color: rgb(113 113 122);
  }

  .publication-compact-links {
    display: flex;
    flex-wrap: wrap;
    gap: 0.65rem;
    margin-top: 0.65rem;
    font-size: 0.9rem;
  }

  .publication-compact-links .hb-attachment-link {
    margin-right: 0;
  }

  .publication-compact-image {
    display: block;
    width: 100%;
    aspect-ratio: 3 / 2;
    overflow: hidden;
    border-radius: 0.5rem;
    background: linear-gradient(135deg, rgb(var(--hb-primary-500-rgb) / 0.16), rgb(113 113 122 / 0.14));
    border: 1px solid rgb(229 231 235 / 0.9);
  }

  .publication-compact-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .publication-compact-placeholder {
    display: flex;
    width: 100%;
    height: 100%;
    align-items: center;
    justify-content: center;
  }

  .publication-compact-placeholder-icon {
    width: 2.75rem;
    height: 2.75rem;
    color: rgb(var(--hb-primary-500-rgb) / 0.42);
  }

  @media (max-width: 640px) {
    .publication-compact-item {
      grid-template-columns: minmax(0, 1fr);
    }

    .publication-compact-image {
      order: -1;
      max-width: 16rem;
    }
  }

  @media (max-width: 768px) {
    .resume-biography .md\:col-span-8:has(.bio-text) {
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3),
    .resume-biography .md\:col-span-8:has(.bio-text) > .mb-16:has(> .flex h3) + div {
      grid-column: 1;
    }
  }
</style>
